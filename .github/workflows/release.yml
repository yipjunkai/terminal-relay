name: Release CLI Binaries

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip tag creation and release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${version} (tag: ${tag})"

      - name: Check tag does not already exist
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Bump the version in Cargo.toml first."
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --package cli --features hosted --target ${{ matrix.target }}

      - name: Package
        id: package
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          name="farwatch-${TAG}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release/farwatch" "dist/${name}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${name}/" 2>/dev/null || true
          cd dist
          tar czf "${name}.tar.gz" "${name}"
          echo "asset_path=dist/${name}.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: farwatch-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset_path }}

  release:
    name: Create Tag & GitHub Release
    needs: [prepare, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

  update-formula:
    name: Update Homebrew Tap
    needs: [prepare, release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: yipjunkai/homebrew-farwatch
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256 hashes
        id: hashes
        shell: bash
        run: |
          echo "sha_x86_mac=$(sha256sum artifacts/farwatch-x86_64-apple-darwin/*.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_arm_mac=$(sha256sum artifacts/farwatch-aarch64-apple-darwin/*.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_x86_linux=$(sha256sum artifacts/farwatch-x86_64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_arm_linux=$(sha256sum artifacts/farwatch-aarch64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHA_X86_MAC: ${{ steps.hashes.outputs.sha_x86_mac }}
          SHA_ARM_MAC: ${{ steps.hashes.outputs.sha_arm_mac }}
          SHA_X86_LINUX: ${{ steps.hashes.outputs.sha_x86_linux }}
          SHA_ARM_LINUX: ${{ steps.hashes.outputs.sha_arm_linux }}
        shell: bash
        run: |
          formula="Formula/farwatch.rb"

          # Update version
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" "$formula"

          # Update tag in download URLs
          sed -i "s|download/v[^/]*/|download/${TAG}/|g" "$formula"
          sed -i "s|farwatch-v[^-]*-|farwatch-${TAG}-|g" "$formula"

          # Update SHA256 hashes (each sha256 line follows the url line for that target)
          sed -i "/x86_64-apple-darwin/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA_X86_MAC}\"/;}" "$formula"
          sed -i "/aarch64-apple-darwin/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA_ARM_MAC}\"/;}" "$formula"
          sed -i "/x86_64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA_X86_LINUX}\"/;}" "$formula"
          sed -i "/aarch64-unknown-linux-gnu/{n;s/sha256 \"[^\"]*\"/sha256 \"${SHA_ARM_LINUX}\"/;}" "$formula"

      - name: Commit and push updated formula
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/farwatch.rb
          git diff --cached --quiet || git commit -m "farwatch ${TAG}"
          git push
