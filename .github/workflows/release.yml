name: Release CLI Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --package cli --features hosted --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          name="terminal-relay-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/terminal-relay" "dist/${name}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${name}/" 2>/dev/null || true
          cd dist
          tar czf "${name}.tar.gz" "${name}"
          echo "asset_path=dist/${name}.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-relay-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset_path }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update formula with SHA256 hashes
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          sha_x86_mac=$(sha256sum artifacts/terminal-relay-x86_64-apple-darwin/*.tar.gz | awk '{print $1}')
          sha_arm_mac=$(sha256sum artifacts/terminal-relay-aarch64-apple-darwin/*.tar.gz | awk '{print $1}')
          sha_x86_linux=$(sha256sum artifacts/terminal-relay-x86_64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')
          sha_arm_linux=$(sha256sum artifacts/terminal-relay-aarch64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')
          python3 -c "
          template = open('Formula/terminal-relay.rb').read()
          import re
          # Update version
          template = re.sub(r'version \"[^\"]+\"', f'version \"${version}\"', template)
          # Update tag in URLs
          template = re.sub(r'download/v[^/]+/', f'download/${tag}/', template)
          template = re.sub(r'terminal-relay-v[^-]+-', f'terminal-relay-${tag}-', template)
          # Update or insert sha256 lines
          def set_sha(text, target, sha):
              lines = text.split('\n')
              result = []
              for i, line in enumerate(lines):
                  result.append(line)
                  if target in line and 'url' in line:
                      # Next line should be sha256 or comment
                      pass
                  elif i > 0 and target in lines[i-1] and 'url' in lines[i-1]:
                      # Replace this sha256/comment line
                      indent = len(line) - len(line.lstrip())
                      result[-1] = ' ' * indent + f'sha256 \"{sha}\"'
              return '\n'.join(result)
          template = set_sha(template, 'x86_64-apple-darwin', '${sha_x86_mac}')
          template = set_sha(template, 'aarch64-apple-darwin', '${sha_arm_mac}')
          template = set_sha(template, 'x86_64-unknown-linux-gnu', '${sha_x86_linux}')
          template = set_sha(template, 'aarch64-unknown-linux-gnu', '${sha_arm_linux}')
          open('Formula/terminal-relay.rb', 'w').write(template)
          "

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/terminal-relay.rb
          git diff --cached --quiet || git commit -m "formula: update to ${GITHUB_REF#refs/tags/}"
          git push
